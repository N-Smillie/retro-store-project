{% extends "base.html" %}

{% block content %}

<div class="container">

    <h1 class="mb-4">

        My Wishlist

    </h1>

    <div class="row">

        {% for item in wishlist_items %}

            <div class="col-md-4 mb-4">

                <div class="card store-card h-100">

                    <div class="image-container">

                        {% if item.game.cover_image %}

                            <img
                                src="{{ item.game.cover_image.url }}"
                                alt="{{ item.game.title }}">

                        {% endif %}

                    </div>

                    <div class="card-body">

                        <h5>
                            {{ item.game.title }}
                        </h5>

                        <p>
                            {{ item.game.get_console_display }}
                        </p>

                        <!-- Notes header row -->
                        <div class="d-flex justify-content-between align-items-center mb-2">

                            <label class="form-label mb-0">
                                Notes
                            </label>

                            <button
                                class="btn btn-sm btn-primary"
                                type="submit">

                                Save

                            </button>

                        </div>

                        <form
                            method="POST"
                            action="{% url 'update_wishlist_notes' item.id %}">

                            {% csrf_token %}

                            <textarea
                                name="notes"
                                class="form-control"
                                rows="3"
                                placeholder="My notes...">{{ item.notes }}</textarea>

                        </form>

                        <div class="wishlist-actions mt-3">

                            <a
                                href="{% url 'game_detail' item.game.id %}"
                                class="btn btn-primary">

                                View

                            </a>

                            <a
                                href="{% url 'remove_from_wishlist' item.game.id %}"
                                class="btn btn-outline-danger">

                                Remove

                            </a>

                        </div>

                    </div>

                </div>

            </div>

        {% empty %}

            <p>

                Your wishlist is empty.

            </p>

        {% endfor %}

    </div>

</div>

{% endblock %}
