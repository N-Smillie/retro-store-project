{% extends "base.html" %}

{% block content %}

<div class="container">

    <h1>Checkout</h1>

    {% for item in items %}

        <div class="card mb-3">

            <div class="card-body">

                <h5>
                    {{ item.game.title }}
                </h5>

                <p>
                    Grade {{ item.grade }}
                </p>

                <p>
                    £{{ item.price }}
                </p>

            </div>

        </div>

    {% endfor %}

</div>

{% endblock %}
