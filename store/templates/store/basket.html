{% extends "base.html" %}

{% block content %}

<div class="container">

    <h1>Basket</h1>

    {% if items %}

        {% for item in items %}

            <div class="card mb-3">

                <div class="card-body">

                    <h5>{{ item.game.title }}</h5>
                    <p>Grade {{ item.grade }}</p>
                    <p>£{{ item.price }}</p>

                </div>

            </div>

        {% endfor %}

    {% else %}

        <p>Your basket is empty.</p>

    {% endif %}

</div>

{% endblock %}
